<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Zuma Inventory Analytics</title>
<style>
:root {
  --accent: #00E273;
  --accent-dark: #00c463;
  --accent-soft: rgba(0,226,115,0.12);
  --navy: #002A3A;
  --gold: #D4A24C;
  --bg: #f6f7f9;
  --card: #ffffff;
  --border: #e5e7eb;
  --border-soft: #f1f5f9;
  --muted: #f8fafc;
  --fg: #0f172a;
  --fg-muted: #1f2937;
  --fg-soft: #334155;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 6px rgba(0,0,0,0.05);
  --radius: 4px;
  --radius-sm: 3px;
  --radius-pill: 999px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
  font-size: 14px;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  height: 100%;
  overflow: hidden;
}
body { display: flex; flex-direction: column; }

.top-strip {
  height: 3px;
  background: linear-gradient(90deg, var(--navy) 0%, var(--navy) 35%, var(--accent) 100%);
  flex-shrink: 0;
}

.top-chrome {
  padding: 10px 22px 0;
  flex-shrink: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.top-chrome-inner { max-width: 1800px; margin: 0 auto; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--navy);
  padding: 10px 14px;
  border-radius: var(--radius);
  color: #fff;
  gap: 14px; flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 6px 6px 18px 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--navy); font-weight: 900; font-size: 14px;
  letter-spacing: -0.04em;
}
.brand-title { font-size: 15px; font-weight: 600; letter-spacing: -0.015em; }
.brand-sub { font-size: 10px; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.14em; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.pill {
  font-size: 10px; background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.75);
  padding: 4px 10px; border-radius: var(--radius-sm);
}

.tab-nav {
  display: flex; flex-wrap: wrap; gap: 3px;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 4px;
  border-radius: var(--radius);
  margin-top: 8px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
}
.tab-btn {
  font: inherit; font-size: 11.5px; font-weight: 600;
  padding: 7px 14px;
  background: transparent; border: none;
  border-radius: var(--radius-pill);
  color: var(--fg-muted); cursor: pointer;
  transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
  letter-spacing: 0.01em;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--fg); background: var(--muted); }
.tab-btn.active {
  color: #fff;
  background: var(--navy);
  box-shadow: 0 1px 3px rgba(0,42,58,0.35), inset 0 -2px 0 var(--accent);
}

.content-area {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: var(--bg);
}
.frame-wrap {
  position: absolute; inset: 0;
  background: var(--bg);
}
#contentFrame {
  width: 100%;
  height: 100%;
  border: none;
  background: var(--bg);
  display: block;
}

.loading-overlay {
  position: absolute; inset: 0;
  background: rgba(246,247,249,0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.loading-overlay.show { opacity: 1; }
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="top-strip"></div>

<div class="top-chrome">
  <div class="top-chrome-inner">
    <header class="header">
      <div class="brand">
        <div class="brand-mark">Z</div>
        <div>
          <div class="brand-title">Zuma Inventory Analytics</div>
          <div class="brand-sub">Inventory · Stock Control · Max Stock · Redistribusi · Stok per Area · SKU Search · Summary Report</div>
        </div>
      </div>
      <div class="header-right">
        <span class="pill">Master data: <strong style="color:#fff">srv1346756.hstgr.cloud</strong></span>
      </div>
    </header>

    <nav class="tab-nav" id="tabNav">
      <button class="tab-btn active" data-tab="inventory">Inventory</button>
      <button class="tab-btn" data-tab="stockcontrol">Stock Control</button>
      <button class="tab-btn" data-tab="maxstock">Max Stock</button>
      <button class="tab-btn" data-tab="redistribusi">Redistribusi</button>
      <button class="tab-btn" data-tab="stockbyarea">Stok per Area</button>
      <button class="tab-btn" data-tab="skusearch">SKU Search</button>
      <button class="tab-btn" data-tab="summaryreport">Summary Report</button>
    </nav>
  </div>
</div>

<div class="content-area">
  <div class="frame-wrap">
    <iframe id="contentFrame" src="./inventory.html" title="Dashboard content"></iframe>
  </div>
  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
</div>

<script>
const TABS = {
  inventory:     './inventory.html',
  stockcontrol:  'https://database-zuma.github.io/zuma-stockcontrol-dashboard/',
  maxstock:      'https://database-zuma.github.io/zuma-maxstock-dashboard/',
  redistribusi:  'https://database-zuma.github.io/zuma-redistribusi-dashboard/',
  stockbyarea:   'https://database-zuma.github.io/zuma-stockbyarea-dashboard/',
  skusearch:     'https://database-zuma.github.io/zuma-skusearch-dashboard/',
  summaryreport: 'https://database-zuma.github.io/zuma-summaryreport-dashboard/',
};

const frame = document.getElementById('contentFrame');
const overlay = document.getElementById('loadingOverlay');

function switchTab(tab) {
  if (!TABS[tab]) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  overlay.classList.add('show');
  frame.src = TABS[tab];
  // Update URL hash for deep-linking
  if (history.replaceState) history.replaceState(null, '', '#' + tab);
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// Hide overlay after iframe loads + inject CSS to hide duplicate header in iframe
frame.addEventListener('load', function() {
  overlay.classList.remove('show');
  try {
    const doc = frame.contentDocument;
    if (!doc) return;
    // Only inject if it's same-origin (it should be — all github.io)
    const existing = doc.getElementById('hub-embed-style');
    if (existing) return;
    const style = doc.createElement('style');
    style.id = 'hub-embed-style';
    style.textContent = `
      /* === HIDE DUPLICATE CHROME === */
      .top-strip { display: none !important; }
      header.header, body > .header, #topbar, .topbar { display: none !important; }
      .view-toggle { display: none !important; }
      .dashboard-body { margin-left: 0 !important; }
      body { padding-left: 0 !important; padding-top: 0 !important; }
      .container { padding-top: 8px !important; padding-left: 18px !important; padding-right: 18px !important; }
      .shell { padding-top: 8px !important; }

      /* === SALES-STYLE RE-SKIN for master dashboards === */
      /* Force system font everywhere (override Poppins) */
      html, body, button, input, select, textarea, table, th, td, .tab, .btn,
      .stat-card, .stat-card *, .chart-card, .analysis-card, h1, h2, h3, h4, h5, p, div, span {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif !important;
      }
      html, body { font-size: 14px !important; background: #f6f7f9 !important; color: #0f172a !important; }

      /* Flatten gradient backgrounds on major containers */
      div[style*="linear-gradient(135deg,#f0fdf4"],
      div[style*="linear-gradient(135deg,#fdf2f8"],
      div[style*="linear-gradient(135deg,#ecfdf5"],
      div[style*="linear-gradient(135deg,#f0f9ff"],
      div[style*="linear-gradient(135deg,#fff7ed"],
      div[style*="linear-gradient(135deg,#fef2f2"],
      div[style*="linear-gradient(135deg,#eff6ff"],
      div[style*="background:linear-gradient(135deg,#f0fdf4"],
      div[style*="background: linear-gradient(135deg, #fdf2f8"] {
        background: #ffffff !important;
        border: 1px solid #e5e7eb !important;
        border-radius: 4px !important;
        padding: 12px 16px !important;
      }

      /* Section header badges (the colored pill titles) — flatten to navy */
      div[style*="background:linear-gradient(135deg,#16a34a"],
      div[style*="background:linear-gradient(135deg,#059669"],
      div[style*="background:linear-gradient(135deg,#0284c7"],
      div[style*="background:linear-gradient(135deg,#db2777"],
      div[style*="background:linear-gradient(135deg,#6366f1"],
      div[style*="background:linear-gradient(135deg,#8b5cf6"],
      div[style*="background: linear-gradient(135deg,#16a34a"],
      div[style*="background: linear-gradient(135deg,#059669"],
      div[style*="background: linear-gradient(135deg, #db2777"] {
        background: #002A3A !important;
        color: #fff !important;
        padding: 6px 14px !important;
        border-radius: 3px !important;
        font-size: 10px !important;
        text-transform: uppercase !important;
        letter-spacing: 0.15em !important;
        font-weight: 700 !important;
      }

      /* Entity pills — flatten to navy/accent */
      .entity-pill { border-radius: 3px !important; padding: 5px 11px !important; font-size: 11px !important; font-weight: 600 !important; background: rgba(255,255,255,0.06) !important; color: rgba(255,255,255,0.6) !important; border: 1px solid rgba(255,255,255,0.1) !important; transform: none !important; box-shadow: none !important; }
      .entity-pill.active { background: #00E273 !important; color: #002A3A !important; border-color: #00E273 !important; transform: none !important; }

      /* entity-toggle-bar buttons */
      .entity-toggle-bar { background: #002A3A !important; border-radius: 4px !important; padding: 4px !important; }
      .entity-toggle-btn { background: transparent !important; color: rgba(255,255,255,0.6) !important; border: none !important; padding: 6px 12px !important; font-size: 11px !important; font-weight: 600 !important; border-radius: 2px !important; }
      .entity-toggle-btn.active { background: #00E273 !important; color: #002A3A !important; }

      /* Stat cards — flat sales style */
      .stat-card, .summary-card {
        background: #ffffff !important;
        border: 1px solid #e5e7eb !important;
        border-radius: 4px !important;
        box-shadow: 0 1px 2px rgba(0,0,0,0.04) !important;
        padding: 11px 14px !important;
      }
      .stat-card::before, .summary-card::before { display: none !important; }
      .stat-card h3, .summary-card .label {
        font-size: 9px !important; font-weight: 700 !important;
        color: #1f2937 !important; text-transform: uppercase !important;
        letter-spacing: 0.15em !important;
      }
      .stat-card .value, .summary-card .value {
        font-size: 15px !important; font-weight: 700 !important;
        color: #0f172a !important; font-variant-numeric: tabular-nums !important;
        display: inline-block !important; padding-bottom: 4px !important;
        border-bottom: 2px solid #00E273 !important;
      }

      /* Chart cards */
      .chart-card, .analysis-card {
        background: #ffffff !important;
        border: 1px solid #e5e7eb !important;
        border-radius: 4px !important;
        box-shadow: 0 1px 2px rgba(0,0,0,0.04) !important;
        padding: 14px !important;
      }
      .chart-card h3, .analysis-card h3 {
        font-size: 10px !important; font-weight: 700 !important;
        color: #0f172a !important; text-transform: uppercase !important;
        letter-spacing: 0.15em !important; margin-bottom: 12px !important;
      }

      /* Tabs (sub-nav inside views) */
      .tabs { background: #ffffff !important; border: 1px solid #e5e7eb !important; border-radius: 4px !important; padding: 4px !important; box-shadow: 0 1px 2px rgba(0,0,0,0.04) !important; }
      .tab { background: transparent !important; color: #1f2937 !important; border: none !important; padding: 7px 14px !important; font-size: 11.5px !important; font-weight: 600 !important; border-radius: 999px !important; }
      .tab.active { background: #002A3A !important; color: #fff !important; box-shadow: 0 1px 3px rgba(0,42,58,0.35), inset 0 -2px 0 #00E273 !important; }

      /* Filters */
      .filters, .filter-group { background: transparent !important; }
      .filter-group label { font-size: 9px !important; font-weight: 700 !important; color: #1f2937 !important; text-transform: uppercase !important; letter-spacing: 0.12em !important; }
      .filter-group select, .filter-group input, .filters select, .filters input {
        font-size: 12px !important; padding: 5px 8px !important;
        border: 1px solid #e5e7eb !important; border-radius: 3px !important;
        background: #ffffff !important;
      }

      /* Tables — navy header sales style */
      table thead tr, table thead { background: #002A3A !important; }
      table thead th { color: rgba(255,255,255,0.9) !important; font-size: 9px !important; font-weight: 700 !important; text-transform: uppercase !important; letter-spacing: 0.1em !important; padding: 8px 10px !important; }

      /* Buttons that use gradients — flatten */
      button[style*="linear-gradient"] {
        background: #002A3A !important;
        color: #fff !important;
        border: 1px solid #002A3A !important;
        border-radius: 3px !important;
        padding: 7px 12px !important;
        font-size: 11.5px !important;
        font-weight: 600 !important;
      }

      /* View-container padding */
      .view-container { padding-top: 0 !important; }

      /* Sidebar button labels (in case sidebar leaks) */
      .view-btn, .entity-toggle-btn { font-family: inherit !important; }
    `;
    doc.head.appendChild(style);
  } catch(e) {
    console.warn('CSS inject into iframe failed (likely cross-origin):', e);
  }
});

// Support deep-linking via hash
(function() {
  const hash = (location.hash || '').replace('#', '');
  if (hash && TABS[hash]) switchTab(hash);
})();
</script>

</body>
</html>
